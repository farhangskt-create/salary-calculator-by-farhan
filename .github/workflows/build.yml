name: CI

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Build with Buildozer
      uses: kivy/buildozer-action@master
      with:
        command: buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: package
        path: bin/*.apk
